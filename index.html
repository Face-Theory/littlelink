<!doctype html>

<!--
  To change the theme, change the class on the html tag below to one of:
  - theme-auto: Automatically switches based on user's system preferences
  - theme-light: Forces light theme
  - theme-dark: Forces dark theme
-->

<html class="theme-auto" lang="de">
    <!-- Update`class="theme-auto" with your preference -->

    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <!-- Page Title - Change this to your name/brand (50-60 characters recommended) -->
        <title>Face Theory</title>
        <link rel="icon" type="image/x-icon" href="/images/avatar.png" />
        <!-- Update this with your own favicon -->

        <!-- Meta Description - Write a description (150-160 characters recommended) -->
        <meta
            name="description"
            content="Das führende Studio für moderne Kosmetologie in Bonn. Beratung, Hautanalyse, und Individueller Pflegeplan.
        Apparative Kosmetik, Microneedling, Anti-age-behandlungen, Skulpturale Massage, Permanent Make-up, Zahnaufhellung"
        />

        <!-- Keywords -->
        <meta
            name="keywords"
            content="Face Theory, FaceTheory, cosmetology, kosmetik, Kosmetikstudio, Kosmetologie, Germany, Bonn, Deutchland, NRW, North Rhine-Westphalia, Nordrhein-Westfalen, Cologne, Koln, Koeln, Köln, Apparative Kosmetik, Microneedling, Anti-age-behandlungen, Gesichtsbehandlungen, Skulpturale Gesichtsmassage, Permanent Make-up, Beratung & Hautanalyse, Individueller Pflegeplan, Zahnaufhellung, Skulpturale Massage"
        />

        <!-- Canonical URL - Helps prevent duplicate content issues -->
        <!--<meta rel="canonical" href="https://yourwebsite.com" />-->

        <!-- Author Information -->
        <!--<meta name="author" content="Your Name" />-->

        <!-- Stylesheets -->
        <link rel="stylesheet" href="css/reset.css" />
        <link rel="stylesheet" href="css/style.css" />
        <link rel="stylesheet" href="css/brands.css" />

        <!-- LittleLink Extended Stylesheet (Optional) -->
        <!-- <link rel="stylesheet" href="css/brands-extended.css"> -->
        <!-- Learn more at https://github.com/sethcottle/littlelink-extended.
         Remove comments if you've added LittleLink Extended dependencies -->
    </head>

    <body>
        <div class="container">
            <div class="column">
                <!--
              By default, the Avatar is rounded. Use the following:
              - avatar--rounded: Automatically rounds the image
              - avatar--soft: Slightly rounds the image
              - avatar--none: Removes any rounding

              Be sure to replace the src with your own image path and update the alt text
            -->
                <img class="avatar avatar--rounded" src="images/avatar.png" srcset="images/avatar@2x.png 2x" alt="LittleLink" />

                <!-- Replace with your name or brand -->
                <h1>
                    <div>Face Theory</div>
                </h1>

                <!-- Add a short description about yourself or your brand -->
                <p>Das führende Studio für moderne Kosmetologie in Bonn.</p>

                <p>Vereinbaren Sie einen Online-Termin über einen Messenger Ihrer Wahl</p>

                <!-- All your buttons go here -->
                <div class="button-stack" role="navigation">
                    <!-- Instagram -->
                    <a class="button button-instagram" href="https://instagram.com/facetheory.studio" role="button">
                        <img class="icon" aria-hidden="true" src="images/icons/instagram.svg" alt="Instagram Logo" />Instagram</a
                    >

                    <!-- WhatsApp -->
                    <a class="button button-whatsapp" href="https://wa.me/380996531192" role="button">
                        <img class="icon" aria-hidden="true" src="images/icons/whatsapp.svg" alt="WhatsApp Logo" />WhatsApp</a
                    >

                    <!-- Telegram -->
                    <a class="button button-telegram" href="http://t.me/facetheorystudio" role="button">
                        <img class="icon" aria-hidden="true" src="images/icons/telegram.svg" alt="Telegram Logo" />Telegram</a
                    >

                    <!-- Generic Calendar -->
                    <!--<a class="button button-default" href="#" role="button">
                        <img class="icon" aria-hidden="true" src="images/icons/generic-calendar.svg" alt="Calendar Icon" />Termin vereinbaren</a
                    >-->

                    <!-- Generic Blog -->
                    <!--<a class="button button-default" href="#" role="button">
                        <img class="icon" aria-hidden="true" src="images/icons/generic-blog.svg" alt="Blog Icon" />Read our blog</a
                    >-->

                    <!-- Generic Map -->
                    <a class="button button-default" href="https://maps.app.goo.gl/1kc3VC7DR1RWr7aN9" role="button">
                        <img class="icon" aria-hidden="true" src="images/icons/generic-map.svg" alt="Map Icon" />Route anzeigen</a
                    >
                </div>

                <p>Thomas-Mann-Straße 60, 53111 Bonn</p>

                <!-- Feel free to add your own footer information, including updating `privacy.html` to reflect how your LittleLink fork is set up -->
                <footer>
                    <a href="privacy.html">Privacy Policy</a> <br />
                    Copyright © Face Theory. Alle Rechte vorbehalten.
                </footer>
            </div>
        </div>
    </body>
</html>
